server:
  port: 8080

spring:
  datasource:
    url: jdbc:clickhouse://localhost:8123/default?compress=0
    username: default
    password: "test123123"
    driver-class-name: com.clickhouse.jdbc.ClickHouseDriver
    data:
      redis:
        host: chart-redis
        port: 6379
        timeout: 2000ms


    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    show-sql: false


  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd
    time-zone: UTC


  sql:
    init:
      mode: never

logging:
  level:
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
    com.clickhouse.jdbc: DEBUG
    root: INFO