<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заболеваемость: Сравнение недель</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <script src="municipalities.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; background: #f4f6f9; color: #333; margin: 0; }
        h1 { text-align: center; margin-bottom: 20px; font-size: 1.5rem; }

        /*  ГЛАВНЫЙ КОНТЕЙНЕР: делит экран надвое */
        .chart-center-wrapper {
            width: 98vw;
            max-width: 2000px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: row; /* Рядом, а не друг под другом */
            gap: 20px;
        }

        .chart-section {
            flex: 1; /* Забирает 50% ширины каждый */
            min-width: 0; /* позволяет скроллу работать внутри flex */
            display: flex;
            flex-direction: column;
        }

        .chart-section h3 {
            margin: 0 0 10px 0;
            color: #444;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .date-badge {
            background: #e9ecef;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #666;
        }

        /* Область с горизонтальным скроллом */
        .chart-scroll-area {
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            height: 520px;
            border: 1px solid #eee;
            border-radius: 4px;
            padding: 10px 0;
            background: #fafafa;
        }

        .chart-canvas-wrapper {
            min-width: 2000px; /* Ширина для отрисовки всех столбцов */
            height: 100%;
            position: relative;
        }

        /* 📱 На маленьких экранах вернётся в колонку */
        @media (max-width: 1100px) {
            .chart-center-wrapper { flex-direction: column; }
        }
    </style>
</head>
<body>
<h1> Заболеваемость по регионам</h1>

<div class="chart-center-wrapper">
    <!-- График 1: Прошлая неделя -->
    <div class="chart-section">
        <h3> Прошлая неделя <span id="prevWeekBadge" class="date-badge">загрузка...</span></h3>
        <div class="chart-scroll-area">
            <div class="chart-canvas-wrapper">
                <canvas id="chartPrev"></canvas>
            </div>
        </div>
    </div>

    <!-- График 2: Текущая неделя -->
    <div class="chart-section">
        <h3> Текущая неделя <span id="currWeekBadge" class="date-badge">загрузка...</span></h3>
        <div class="chart-scroll-area">
            <div class="chart-canvas-wrapper">
                <canvas id="chartCurr"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const THRESHOLD_PERCENT = 10;

    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const [prevRes, currRes] = await Promise.all([
                fetch('/api/epid/by-municipality?week=previous'),
                fetch('/api/epid/by-municipality?week=current')
            ]);

            if (!prevRes.ok || !currRes.ok) throw new Error('Ошибка загрузки API');

            const prevData = await prevRes.json();
            const currData = await currRes.json();

            renderBarChart('chartPrev', prevData, 'prevWeekBadge');
            renderBarChart('chartCurr', currData, 'currWeekBadge');

        } catch (err) {
            alert('Ошибка: ' + err.message);
            console.error(err);
        }
    });

    function renderBarChart(canvasId, rawData, badgeId) {
        if (!rawData || rawData.length === 0) {
            document.getElementById(badgeId).textContent = "нет данных";
            return;
        }

        const firstItem = rawData[0];
        if (firstItem.weekStart) {
            const start = new Date(firstItem.weekStart);
            const end = new Date(start);
            end.setDate(end.getDate() + 6);
            const fmt = d => d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
            document.getElementById(badgeId).textContent = `${fmt(start)} — ${fmt(end)}`;
        }

        const chartData = rawData.map(row => {
            const id = row.municipalityId;
            const sickCount = row.uniquePatientsCount || 0;
            const mun = MUNICIPALITIES[id];
            const population = mun?.population || 1;
            const percent = (sickCount / population) * 100;

            return {
                label: mun?.name || `Регион #${id}`,
                percent: percent,
                sickCount: sickCount,
                population: population
            };
        });

        chartData.sort((a, b) => b.percent - a.percent);

        const labels = chartData.map(d => d.label);
        const values = chartData.map(d => d.percent);
        const colors = values.map(v => v > THRESHOLD_PERCENT ? 'rgba(220, 53, 69, 0.7)' : 'rgba(40, 167, 69, 0.7)');
        const borders = values.map(v => v > THRESHOLD_PERCENT ? 'rgb(220, 53, 69)' : 'rgb(40, 167, 69)');

        const ctx = document.getElementById(canvasId).getContext('2d');
        const canvas = document.getElementById(canvasId);
        canvas.width = 2000;
        canvas.height = 490;

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Заболеваемость (%)',
                    data: values,
                    backgroundColor: colors,
                    borderColor: borders,
                    borderWidth: 1,
                    borderRadius: 4,
                    barPercentage: 0.9,
                    categoryPercentage: 0.95
                }]
            },
            options: {
                responsive: false,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: ctx => {
                                const d = chartData[ctx.dataIndex];
                                return [
                                    `🤒 Заболевших: ${d.sickCount.toLocaleString()}`,
                                    `👥 Население: ${d.population.toLocaleString()}`,
                                    ` Доля: ${d.percent.toFixed(3)}%`
                                ];
                            }
                        }
                    },
                    annotation: {
                        annotations: {
                            line1: {
                                type: 'line',
                                yMin: THRESHOLD_PERCENT,
                                yMax: THRESHOLD_PERCENT,
                                borderColor: 'rgb(255, 193, 7)',
                                borderWidth: 2,
                                borderDash: [6, 4],
                                label: {
                                    display: true,
                                    content: `Порог: ${THRESHOLD_PERCENT}%`,
                                    position: 'start',
                                    backgroundColor: 'rgba(255, 193, 7, 0.9)',
                                    color: '#000',
                                    font: { size: 11 }
                                }
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { callback: v => v.toFixed(3) + '%' },
                        title: { display: true, text: 'Процент от населения' }
                    },
                    x: {
                        ticks: { autoSkip: false, maxRotation: 45, minRotation: 45, font: { size: 10 } },
                        grid: { display: false }
                    }
                }
            }
        });
    }
</script>
</body>
</html>
